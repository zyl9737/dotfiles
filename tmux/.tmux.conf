# --- 双前缀键配置 ---
set -g prefix C-a              # 主前缀键
set -g prefix2 C-b             # 次前缀键 (保留默认)
bind C-a send-prefix           # 发送前缀键到嵌套会话
bind C-b send-prefix

# --- 基础显示与索引 ---
set -g base-index 1            # 窗口索引从 1 开始
setw -g pane-base-index 1       # 面板索引从 1 开始
set -g renumber-windows on      # 窗口关闭后重新编号

# --- 你要求的终端与图形优化 ---
set -g default-terminal "tmux-256color"
set -g set-clipboard on
set -gq allow-passthrough on   # 允许 Sixel 等序列穿透
set -g visual-activity off
set-option -g focus-events on

# --- Terminal Overrides (Sixel, RGB, OSC 52) ---
set -as terminal-overrides ',xterm*:Ms=\E]52;%p1%s;%p2%s\007'
set -as terminal-overrides ',*:Smks=\E[?1251h:Rmks=\E[?1251l'
set -as terminal-overrides ',*:Sixel'
set -ga terminal-overrides ",*:RGB"

# --- 极简状态栏 (去时间) ---
set -g status-style "bg=default,fg=brightblue"
set -g status-left "[#S] "      # 左侧显示会话名
set -g status-right ""          # 右侧留空，不显示时间
setw -g window-status-current-format "#[fg=white,bold] #I:#W* "
setw -g window-status-format "#[fg=brightblack] #I:#W  "

# --- 针对 Neovim 的交互优化 ---
set -sg escape-time 0           # 消除 Esc 延迟
bind m set -g mouse \; display-message "Mouse: #{?mouse,ON,OFF}"
